<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NO-SIGNAL — AI Roleplay</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">NO-SIGNAL</span>
      </div>

      <div id="character-panel">
        <h3>Character</h3>
        <div id="character-card">
          <div id="character-avatar">?</div>
          <div id="character-info">
            <span id="character-name">No character</span>
            <span id="character-status">Select or create one</span>
          </div>
        </div>
        <button id="btn-new-character" class="btn-secondary">+ New character</button>
      </div>

      <div id="session-panel">
        <h3>Sessions</h3>
        <ul id="session-list">
          <!-- Sessions injected by JS -->
        </ul>
        <button id="btn-new-session" class="btn-secondary">+ New session</button>
      </div>
    </aside>

    <!-- Main chat area -->
    <main id="chat-area">
      <header id="chat-header">
        <span id="chat-title">Select a session</span>
        <div id="header-actions">
          <button id="btn-memory" class="btn-icon" title="View memory">🧠</button>
          <button id="btn-settings" class="btn-icon" title="Settings">⚙</button>
        </div>
      </header>

      <div id="messages">
        <div id="empty-state">
          <p class="empty-icon">◈</p>
          <p>Start a session to begin the roleplay.</p>
        </div>
      </div>

      <div id="input-area">
        <textarea
          id="user-input"
          placeholder="Write your message..."
          rows="1"
          disabled
        ></textarea>
        <button id="btn-send" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </main>

    <!-- Modal: New character -->
    <div id="modal-character" class="modal hidden">
      <div class="modal-box">
        <h2>Create a character</h2>
        <label>Name
          <input type="text" id="char-name" placeholder="Aiko" />
        </label>
        <label>Personality
          <input type="text" id="char-personality" placeholder="Cold, sarcastic" />
        </label>
        <label>Tone
          <input type="text" id="char-tone" placeholder="Short, ironic responses" />
        </label>
        <label>Lore / Background
          <textarea id="char-lore" placeholder="Cyberpunk hacker from Neo-Tokyo..."></textarea>
        </label>
        <div class="modal-actions">
          <button id="btn-cancel-character" class="btn-secondary">Cancel</button>
          <button id="btn-save-character" class="btn-primary">Save</button>
        </div>
      </div>
    </div>

    <!-- Modal: Memory viewer -->
    <div id="modal-memory" class="modal hidden">
      <div class="modal-box">
        <h2>🧠 Memory</h2>
        <section>
          <h4>Short-term (last messages)</h4>
          <pre id="memory-short"></pre>
        </section>
        <section>
          <h4>Long-term (summary)</h4>
          <pre id="memory-long">No summary yet.</pre>
        </section>
        <div class="modal-actions">
          <button id="btn-close-memory" class="btn-secondary">Close</button>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
